<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f4f4;
    }

    header{
      background:black;
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .container{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0px 0px 10px #ccc;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:10px 0;
    }

    button{
      padding:10px;
      width:100%;
      border:none;
      cursor:pointer;
      background:black;
      color:white;
    }

    button:hover{
      background:green;
    }

    .logout{
      background:red;
      width:auto;
      padding:8px 15px;
    }

    .msg{
      font-size:14px;
      color:green;
    }
  </style>
</head>

<body>

<header>
  <h2>Admin Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- PROJECTS -->
  <div class="card">
    <h3>Add Project</h3>
    <input id="title" placeholder="Project Title">
    <textarea id="desc" placeholder="Project Description"></textarea>
    <button onclick="addProject()">Add Project</button>
    <p id="projectMsg" class="msg"></p>
  </div>

  <!-- CERTIFICATES -->
  <div class="card">
    <h3>Add Certificate</h3>
    <input id="certName" placeholder="Certificate Name">
    <input id="certImg" placeholder="Image URL">
    <button onclick="addCertificate()">Add Certificate</button>
    <p id="certMsg" class="msg"></p>
  </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* =========================
   🔐 LOGIN CHECK
========================= */

if(!localStorage.getItem("isLoggedIn")){
  window.location.href = "login.html";
}


/* =========================
   🔥 SUPABASE SETUP
========================= */

const supabaseUrl = "https://ezkwfqafaitcgatmkxvb.supabase.co";
const supabaseKey = ""eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6a3dmcWFmYWl0Y2dhdG1reHZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4ODg4OTIsImV4cCI6MjA5NjQ2NDg5Mn0.prvfYOphxDw9rfx3_ZpVKia1yGjxU6tvHYLs1zMR_MQ";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);


/* =========================
   🚪 LOGOUT
========================= */

function logout(){
  localStorage.removeItem("isLoggedIn");
  window.location.href = "login.html";
}


/* =========================
   🚀 ADD PROJECT
========================= */

async function addProject(){

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  const { error } = await supabase
    .from("projects")
    .insert([{ title, description: desc }]);

  if(error){
    document.getElementById("projectMsg").innerText = "❌ Error adding project";
  } else {
    document.getElementById("projectMsg").innerText = "✅ Project added!";
    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
  }
}


/* =========================
   🏆 ADD CERTIFICATE
========================= */

async function addCertificate(){

  const name = document.getElementById("certName").value;
  const img = document.getElementById("certImg").value;

  const { error } = await supabase
    .from("certificates")
    .insert([{ certificate_name: name, image_url: img }]);

  if(error){
    document.getElementById("certMsg").innerText = "❌ Error adding certificate";
  } else {
    document.getElementById("certMsg").innerText = "✅ Certificate added!";
    document.getElementById("certName").value = "";
    document.getElementById("certImg").value = "";
  }
}

</script>

</body>
</html>
