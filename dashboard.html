<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f4f4;
    }

    header{
      background:black;
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .container{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0px 0px 10px #ccc;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:10px 0;
    }

    button{
      padding:10px;
      width:100%;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover{
      background:green;
    }

    .logout{
      background:red;
      width:auto;
      padding:8px 15px;
    }
  </style>
</head>

<body>

<header>
  <h2>Admin Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- SKILLS -->
  <div class="card">
    <h3>Add Skill</h3>
    <input id="skill" placeholder="Enter Skill">
    <button onclick="addSkill()">Add Skill</button>
  </div>

  <!-- PROJECTS -->
  <div class="card">
    <h3>Add Project</h3>
    <input id="title" placeholder="Project Title">
    <textarea id="desc" placeholder="Project Description"></textarea>
    <button onclick="addProject()">Add Project</button>
  </div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* =========================
   🔐 LOGIN CHECK (IMPORTANT)
========================= */

if(!localStorage.getItem("isLoggedIn")){
  window.location.href = "login.html";
}


/* =========================
   🔥 SUPABASE SETUP
========================= */

const supabaseUrl = "https://ezkwfqafaitcgatmkxvb.supabase.co";
const supabaseKey = ""eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6a3dmcWFmYWl0Y2dhdG1reHZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4ODg4OTIsImV4cCI6MjA5NjQ2NDg5Mn0.prvfYOphxDw9rfx3_ZpVKia1yGjxU6tvHYLs1zMR_MQ";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);


/* =========================
   🚪 LOGOUT
========================= */

function logout(){
  localStorage.removeItem("isLoggedIn");
  window.location.href = "login.html";
}


/* =========================
   ⭐ ADD SKILL
========================= */

async function addSkill(){

  const skill = document.getElementById("skill").value;

  const { error } = await supabase
    .from("skills")
    .insert([{ name: skill }]);

  if(error){
    alert("Error adding skill");
  } else {
    alert("Skill added!");
    document.getElementById("skill").value = "";
  }
}


/* =========================
   🚀 ADD PROJECT
========================= */

async function addProject(){

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  const { error } = await supabase
    .from("projects")
    .insert([
      {
        title: title,
        description: desc
      }
    ]);

  if(error){
    alert("Error adding project");
  } else {
    alert("Project added!");
    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
  }
}

</script>

</body>
</html>
