<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>

<body>

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

<!-- Supabase CDN (MUST BE FIRST) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* =========================
   🔥 SUPABASE CONFIG
========================= */

const supabaseUrl = "https://ezkwfqafaitcgatmkxvb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6a3dmcWFmYWl0Y2dhdG1reHZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4ODg4OTIsImV4cCI6MjA5NjQ2NDg5Mn0.prvfYOphxDw9rfx3_ZpVKia1yGjxU6tvHYLs1zMR_MQ";

/* ⚠️ IMPORTANT FIX */
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);


/* =========================
   🚀 LOGIN FUNCTION
========================= */

window.login = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    document.getElementById("msg").innerText = "Enter email & password";
    return;
  }

  document.getElementById("msg").innerText = "Logging in...";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    console.log(error);
    document.getElementById("msg").innerText = error.message;
    return;
  }

  document.getElementById("msg").innerText = "Login Success";

  localStorage.setItem("isLoggedIn", "true");

  setTimeout(()=>{
    window.location.href = "dashboard.html";
  }, 800);

}

</script>

</body>
</html>
