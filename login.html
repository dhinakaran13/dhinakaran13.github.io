<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body{
      font-family: Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f2f2f2;
    }

    .box{
      background:white;
      padding:30px;
      border-radius:10px;
      width:300px;
      box-shadow:0px 0px 10px #ccc;
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
    }

    button{
      width:100%;
      padding:10px;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover{
      background:green;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Admin Login</h2>

  <input id="email" type="email" placeholder="Enter Email">
  <input id="password" type="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* ==============================
   🔥 STEP 1: CHANGE THIS (IMPORTANT)
================================ */

// 👉 Supabase Project URL paste here
const supabaseUrl = "YOUR_SUPABASE_URL";

// 👉 Supabase ANON KEY paste here
const supabaseKey = "YOUR_SUPABASE_ANON_KEY";

// Create client
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);


/* ==============================
   🔥 LOGIN FUNCTION
================================ */

async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const msg = document.getElementById("msg");

  msg.innerText = "Logging in...";

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error){
    msg.innerText = "❌ Login Failed. Check email/password";
    return;
  }

  // Success login
  msg.innerText = "✅ Login Success! Redirecting...";

  // Save session (simple control)
  localStorage.setItem("isLoggedIn", "true");

  setTimeout(()=>{
    window.location.href = "dashboard.html";
  }, 1000);
}
</script>

</body>
</html>
